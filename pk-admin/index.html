<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#050505">
<title>פקע פקע | ניהול</title>
<link rel="stylesheet" href="admin.css?v=1.29">
</head>
<body>
<main class="adminShell">
  <div id="pullRefresh" class="pullRefresh">משוך לרענון</div>
  <section id="loginScreen" class="screen active">
    <div class="loginCard">
      <div class="lockIcon">🔒</div>
      <h1>פקע פקע</h1>
      <p>מרכז הניהול</p>
      <input id="adminPassword" type="password" autocomplete="current-password" placeholder="סיסמה">
      <div id="loginError" class="errorText"></div>
      <button id="loginBtn">כניסה</button>
    </div>
  </section>

  <section id="dashboardScreen" class="screen">
    <header class="adminHeader">
      <div>
        <h1>מרכז הניהול</h1>
        <p id="lastUpdated">טוען נתונים...</p>
      </div>
      <button id="logoutBtn" class="smallBtn">יציאה</button>
    </header>

    <div id="setupError" class="setupError"></div>

    <section class="cardsGrid">
      <article class="statCard highlight">
        <span>משתמשים פעילים</span>
        <strong id="activeUsers">0</strong>
        <em>סרקו לפחות פעם אחת ב־7 ימים</em>
      </article>
      <article class="statCard">
        <span>מחלקות פעילות</span>
        <strong id="activeDepartments">0</strong>
      </article>
      <article class="statCard">
        <span>סה״כ משתמשים</span>
        <strong id="totalUsers">0</strong>
      </article>
      <article class="statCard">
        <span>סה״כ סריקות</span>
        <strong id="totalScans">0</strong>
      </article>
    </section>

    <section class="topDepartmentCard">
      <span>המחלקה הפעילה ביותר</span>
      <strong id="topDepartmentNumber">—</strong>
      <div class="topDepartmentStats">
        <div><b id="topDepartmentActiveUsers">0</b><small>פעילים</small></div>
        <div><b id="topDepartmentUsers">0</b><small>משתמשים</small></div>
        <div><b id="topDepartmentScans">0</b><small>סריקות</small></div>
      </div>
    </section>

    <section class="panelBlock">
      <div class="blockTitle">מחלקות לפי משתמשים פעילים</div>
      <div id="departmentsList" class="listBox"></div>
    </section>
  </section>
</main>

<script src="../js/config.js?v=1.29"></script>
<script src="../js/utils.js?v=1.29"></script>
<script src="admin.js?v=1.29"></script>
</body>
</html>
