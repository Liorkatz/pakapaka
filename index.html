<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="פקעות">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>פקעות</title>
  <style>
    :root{--safe-bottom:env(safe-area-inset-bottom,0px);--safe-top:env(safe-area-inset-top,0px)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;min-height:100%;font-family:Arial,sans-serif;background:#000;color:#fff}body{overscroll-behavior:none}
    .page{min-height:100dvh;display:none;padding:calc(18px + var(--safe-top)) 18px 120px}.page.active{display:block}
    h1{margin:6px 0 8px;font-size:34px;line-height:1.1}.subtitle{margin:0 0 16px;color:#aaa;font-size:16px;line-height:1.35}
    .tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 18px;background:#111;border:1px solid #252525;border-radius:18px;padding:5px}.tab{border:0;border-radius:14px;padding:12px;font-size:18px;background:transparent;color:#999}.tab.active{background:#fff;color:#000}
    .sectionTitle{font-size:16px;color:#bbb;margin:18px 0 8px;font-weight:700}.sectionLine{height:1px;background:#242424;margin-bottom:8px}.list{padding-bottom:20px}.itemShell{position:relative;margin:12px 0;border-radius:18px;overflow:hidden;background:#8b1616}.deleteHint{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-start;padding-left:22px;color:#fff;font-size:17px;font-weight:700;direction:ltr}
    .item{position:relative;background:#1b1b1b;border:1px solid #333;border-radius:18px;padding:18px 18px 54px;font-size:24px;font-weight:700;cursor:pointer;min-height:118px;transition:transform .18s ease;touch-action:pan-y}.item:active{background:#242424}.item .num{direction:ltr;text-align:left;font-size:16px;color:#aaa;margin-top:8px;font-weight:400;word-break:break-all}.itemDate{position:absolute;left:16px;bottom:15px;direction:ltr;color:#8e8e8e;font-size:13px;font-weight:400}.star{position:absolute;left:14px;top:10px;width:42px;height:42px;padding:0;border-radius:50%;background:transparent;color:#777;font-size:30px;line-height:42px}.star.on{color:#ffd54a}.scopeBadge{position:absolute;right:16px;bottom:15px;color:#777;font-size:13px;font-weight:400}
    .bottom{position:fixed;left:0;right:0;bottom:0;padding:12px 18px calc(12px + var(--safe-bottom));background:#000;z-index:20;border-top:1px solid #222}button{width:100%;border:0;border-radius:18px;padding:17px;font-size:21px;font-weight:700;background:#fff;color:#000;cursor:pointer}button:active{transform:scale(.99)}.back{background:#222;color:#fff;margin-bottom:18px;border:1px solid #444}
    label{display:block;font-size:18px;margin:18px 0 8px;color:#ddd}input,textarea{width:100%;border-radius:16px;border:1px solid #444;background:#111;color:#fff;padding:16px;font-size:22px;outline:none}input:focus,textarea:focus{border-color:#fff}textarea{min-height:80px;resize:vertical}.save{margin-top:24px;margin-bottom:20px}.whitePage{background:#fff;color:#000;text-align:center;display:none;min-height:100dvh;padding:calc(20px + var(--safe-top)) 16px calc(20px + var(--safe-bottom))}.whitePage.active{display:flex;flex-direction:column;justify-content:center;align-items:center}.barcodeWrap{width:100%;max-width:760px}.barcodeName{font-size:34px;font-weight:700;margin-bottom:22px;line-height:1.15}.barcodeNumber{direction:ltr;font-size:24px;letter-spacing:1px;margin-bottom:14px;word-break:break-all}#barcodeSvg{width:100%;overflow:hidden}#barcodeSvg svg{width:100%;max-width:760px;height:auto;display:block;margin:0 auto}.whiteBack{position:fixed;top:calc(12px + var(--safe-top));right:12px;width:auto;padding:11px 17px;border-radius:14px;background:#111;color:#fff;font-size:18px;z-index:10}.empty{color:#999;font-size:18px;margin-top:30px;line-height:1.45}.smallHelp{color:#888;font-size:15px;margin-top:10px;line-height:1.35}
  </style>
</head>
<body>
<section id="home" class="page active">
  <h1>פקעות</h1>
  <p class="subtitle">הלשונית הפעילה קובעת איפה הפקעה נשמרת. מחיקה: החלקה ימינה.</p>
  <div class="tabs"><button id="tabLocal" class="tab active" onclick="setTab('local')">מקומי</button><button id="tabShared" class="tab" onclick="setTab('shared')">משותף</button></div>
  <div id="list" class="list"></div>
  <div class="bottom"><button onclick="showPage('newPage')">הכנס פקעה חדשה</button></div>
</section>
<section id="newPage" class="page">
  <button class="back" onclick="showPage('home')">חזור</button>
  <h1>פקעה חדשה</h1>
  <div class="smallHelp" id="saveTargetHelp"></div>
  <label>שם הפקעה</label><input id="name" autocomplete="off" placeholder="לדוגמה: תקלה">
  <label>מספר ברקוד</label><input id="code" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="לדוגמה: 6002634200000004">
  <label>הערות</label><textarea id="notes" placeholder="לא חובה"></textarea>
  <button class="save" onclick="saveItem()">שמור</button>
  <div class="smallHelp">הברקוד נוצר בפורמט Code 128C, לכן מספר הברקוד חייב להיות עם כמות זוגית של ספרות.</div>
</section>
<section id="barcodePage" class="whitePage"><button class="whiteBack" onclick="showPage('home')">חזור</button><div class="barcodeWrap"><div class="barcodeName" id="barcodeName"></div><div class="barcodeNumber" id="barcodeNumber"></div><div id="barcodeSvg"></div></div></section>
<script>
const STORAGE_KEY="pekaot_barcode_v3";
const SHARED_FAV_KEY="pakapaka_shared_favorites_v1";
const SUPABASE_URL="https://inotumlxglxsilatijat.supabase.co";
const SUPABASE_KEY="sb_publishable_1wmOkorn4YGH1T9ciWIhZw_Gku_NUE9";
let activeTab=localStorage.getItem('pakapaka_active_tab')||'local';
let sharedItems=[];let sharedLoaded=false;let touchState=null;
const C128=["212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"];
function migrateOldData(){const old=localStorage.getItem("pekaot_barcode_v2");const current=localStorage.getItem(STORAGE_KEY);if(old&&!current)localStorage.setItem(STORAGE_KEY,old)}
function getLocalItems(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]").map(normalizeLocalItem)}catch(e){return[]}}
function normalizeLocalItem(x){const id=Number(x.id||Date.now());return{id,createdAt:Number(x.createdAt||id),name:x.name||'',code:x.code||'',notes:x.notes||'',favorite:!!x.favorite}}
function setLocalItems(items){localStorage.setItem(STORAGE_KEY,JSON.stringify(items.map(normalizeLocalItem)))}
function getSharedFavs(){try{return JSON.parse(localStorage.getItem(SHARED_FAV_KEY)||"[]")}catch(e){return[]}}
function setSharedFavs(ids){localStorage.setItem(SHARED_FAV_KEY,JSON.stringify([...new Set(ids)]))}
function headers(){return{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`,"Content-Type":"application/json"}}
function normalizeCode(s){return(s||"").replace(/\D/g,"")}
function showPage(id){document.querySelectorAll(".page,.whitePage").forEach(p=>p.classList.remove("active"));document.getElementById(id).classList.add("active");window.scrollTo(0,0);if(id==="newPage")document.getElementById('saveTargetHelp').textContent=activeTab==='shared'?'השמירה תהיה במשותף ותופיע אצל כולם.':'השמירה תהיה מקומית רק במכשיר הזה.';if(id==="home")renderList()}
function setTab(tab){activeTab=tab;localStorage.setItem('pakapaka_active_tab',tab);renderList();if(tab==='shared')loadShared()}
async function loadShared(){if(activeTab==='shared')showLoading();try{const r=await fetch(`${SUPABASE_URL}/rest/v1/pakapaka_items?select=id,name,barcode,notes,created_at&order=created_at.desc`,{headers:headers()});if(!r.ok)throw new Error(await r.text());const favs=getSharedFavs();sharedItems=(await r.json()).map(x=>({id:x.id,createdAt:new Date(x.created_at).getTime(),name:x.name,code:x.barcode,notes:x.notes||'',favorite:favs.includes(x.id)}));sharedLoaded=true;renderList()}catch(e){document.getElementById('list').innerHTML='<div class="empty">שגיאה בטעינת הרשימה המשותפת.<br>בדוק שהטבלה וההרשאות נוצרו.</div>'}}
function showLoading(){document.getElementById('list').innerHTML='<div class="empty">טוען רשימה משותפת...</div>'}
async function saveItem(){const name=document.getElementById("name").value.trim();const code=normalizeCode(document.getElementById("code").value);const notes=document.getElementById("notes").value.trim();if(!name)return alert("חסר שם פקעה");if(!code)return alert("חסר מספר ברקוד");if(code.length%2!==0)return alert("המספר חייב להיות עם כמות זוגית של ספרות");if(activeTab==='shared')await saveShared(name,code,notes);else saveLocal(name,code,notes);document.getElementById("name").value="";document.getElementById("code").value="";document.getElementById("notes").value="";showPage("home")}
function saveLocal(name,code,notes){const now=Date.now();const items=getLocalItems();items.unshift({id:now,createdAt:now,name,code,notes,favorite:false});setLocalItems(items)}
async function saveShared(name,code,notes){const r=await fetch(`${SUPABASE_URL}/rest/v1/pakapaka_items`,{method:'POST',headers:{...headers(),Prefer:'return=representation'},body:JSON.stringify({name,barcode:code,notes})});if(!r.ok){alert('שמירה למשותף נכשלה');throw new Error(await r.text())}await loadShared()}
function renderList(){document.getElementById('tabLocal').classList.toggle('active',activeTab==='local');document.getElementById('tabShared').classList.toggle('active',activeTab==='shared');if(activeTab==='shared'&&!sharedLoaded){loadShared();return}let items=activeTab==='shared'?sharedItems:getLocalItems();items=[...items].sort((a,b)=>Number(b.favorite)-Number(a.favorite)||Number(b.createdAt)-Number(a.createdAt));const fav=items.filter(x=>x.favorite);const all=items.filter(x=>!x.favorite);const list=document.getElementById("list");if(!items.length){list.innerHTML=`<div class="empty">אין פקעות ב${activeTab==='local'?'מקומי':'משותף'}.</div>`;return}list.innerHTML=`${renderSection('⭐ מועדפים',fav)}${renderSection('כל הפקעות',all)}`;bindActions()}
function renderSection(title,items){if(!items.length)return'';return `<div class="sectionTitle">${title}</div><div class="sectionLine"></div>${items.map(renderItem).join('')}`}
function renderItem(x){return `<div class="itemShell"><div class="deleteHint">מחק</div><div class="item" data-id="${escapeAttr(x.id)}"><button class="star ${x.favorite?'on':''}" data-action="star" data-id="${escapeAttr(x.id)}">★</button>${escapeHtml(x.name)}<div class="num">${escapeHtml(x.code)}</div><div class="scopeBadge">${activeTab==='shared'?'משותף':'מקומי'}</div><div class="itemDate">${formatDate(x.createdAt)}</div></div></div>`}
function bindActions(){document.querySelectorAll('.item').forEach(el=>{el.addEventListener('click',e=>{if(e.target.dataset.action==='star')return;openBarcode(el.dataset.id)});el.addEventListener('touchstart',onTouchStart,{passive:true});el.addEventListener('touchmove',onTouchMove,{passive:false});el.addEventListener('touchend',onTouchEnd,{passive:true})});document.querySelectorAll('[data-action="star"]').forEach(el=>el.addEventListener('click',e=>toggleFavorite(e,el.dataset.id)))}
function toggleFavorite(event,id){event.stopPropagation();if(activeTab==='shared'){const favs=getSharedFavs();const i=favs.indexOf(id);if(i>=0)favs.splice(i,1);else favs.push(id);setSharedFavs(favs);sharedItems=sharedItems.map(x=>x.id===id?{...x,favorite:!x.favorite}:x)}else{const items=getLocalItems();const item=items.find(x=>String(x.id)===String(id));if(item)item.favorite=!item.favorite;setLocalItems(items)}renderList()}
async function deleteById(id){const item=(activeTab==='shared'?sharedItems:getLocalItems()).find(x=>String(x.id)===String(id));if(!item)return;if(!confirm(`למחוק את ${item.name}?`)){renderList();return}if(activeTab==='shared'){const r=await fetch(`${SUPABASE_URL}/rest/v1/pakapaka_items?id=eq.${encodeURIComponent(id)}`,{method:'DELETE',headers:headers()});if(!r.ok){alert('מחיקה מהמשותף נכשלה');renderList();return}sharedItems=sharedItems.filter(x=>x.id!==id)}else setLocalItems(getLocalItems().filter(x=>String(x.id)!==String(id)));renderList()}
function onTouchStart(e){const t=e.touches[0];touchState={el:e.currentTarget,id:e.currentTarget.dataset.id,startX:t.clientX,startY:t.clientY,moved:false}}
function onTouchMove(e){if(!touchState)return;const t=e.touches[0];const dx=t.clientX-touchState.startX;const dy=t.clientY-touchState.startY;if(Math.abs(dy)>Math.abs(dx))return;if(dx>0){e.preventDefault();touchState.moved=true;touchState.el.style.transform=`translateX(${Math.min(dx,120)}px)`}}
function onTouchEnd(){if(!touchState)return;const current=touchState.el.style.transform.match(/translateX\((\d+)/);const dx=current?Number(current[1]):0;const id=touchState.id;touchState.el.style.transform='';const shouldDelete=touchState.moved&&dx>85;touchState=null;if(shouldDelete)deleteById(id)}
function openBarcode(id){const items=activeTab==='shared'?sharedItems:getLocalItems();const item=items.find(x=>String(x.id)===String(id));if(!item)return;document.getElementById("barcodeName").textContent=item.name;document.getElementById("barcodeNumber").textContent=item.code;document.getElementById("barcodeSvg").innerHTML=code128Csvg(item.code);showPage("barcodePage")}
function formatDate(value){const d=new Date(Number(value)||Date.now());return d.toLocaleString('he-IL',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'})}
function code128Csvg(num){num=normalizeCode(num);let values=[105];for(let i=0;i<num.length;i+=2)values.push(parseInt(num.slice(i,i+2),10));let checksum=values[0];for(let i=1;i<values.length;i++)checksum+=values[i]*i;checksum%=103;values.push(checksum,106);let x=0,module=3.0,height=180,bars="";for(const v of values){const p=C128[v];for(let i=0;i<p.length;i++){const w=parseInt(p[i],10)*module;if(i%2===0)bars+=`<rect x="${x.toFixed(2)}" y="0" width="${w.toFixed(2)}" height="${height}" fill="#000"/>`;x+=w}}const width=Math.ceil(x);return`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" preserveAspectRatio="xMidYMid meet">${bars}</svg>`}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escapeAttr(s){return escapeHtml(String(s))}
if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
migrateOldData();setLocalItems(getLocalItems());renderList();
</script>
</body>
</html>
