<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="פקעות">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/main.css?v=1.30">
<title>פקעות</title>
<style>
.lastScannedText{display:block;margin-top:4px;font-size:12px;font-weight:500;color:#9f9f9f;white-space:nowrap}
.lastScannedText.today{color:#3b82f6;font-weight:700}
.topBarActions{display:flex;align-items:center;gap:8px;direction:ltr}
.shareBtn{width:42px;height:40px;padding:0;display:flex;align-items:center;justify-content:center;background:#1d1d1d;color:#fff;border:1px solid #333;border-radius:14px}
.shareBtn svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<section id="home" class="page active">
  <div class="topBar"><h1>פקעות</h1><div class="topBarActions"><button class="shareBtn" onclick="shareApp()" aria-label="שתף את האפליקציה" title="שתף את האפליקציה"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V3"></path><path d="m7 8 5-5 5 5"></path><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"></path></svg></button><button class="refreshBtn" onclick="refreshList()">↻</button></div></div>
  <p id="homeHelp" class="subtitle">מועדפים למעלה. מחיקה: החלקה ימינה.</p>
  <div class="tabs"><button id="tabLocal" class="tab active" onclick="setTab('local')">מקומי</button><button id="tabShared" class="tab" onclick="setTab('shared')">משותף</button></div>
  <div id="list" class="list"></div>
  <div class="bottom"><button onclick="showPage('newPage')">הכנס פקעה חדשה</button></div>
</section>

<section id="newPage" class="page">
  <button class="back" onclick="showPage('home')">חזור</button>
  <h1>פקעה חדשה</h1>
  <div class="saveChoiceTitle">איפה לשמור?</div>
  <div class="saveTabs"><button id="saveLocalBtn" class="saveTab" onclick="setSaveTarget('local')">מקומי</button><button id="saveSharedBtn" class="saveTab" onclick="setSaveTarget('shared')">משותף</button></div>
  <label>שם הפקעה <span class="labelHint">יש לשמור על סיווג מתאים</span></label><input id="name" autocomplete="off" maxlength="60" placeholder="תיאור בראשי תיבות">
  <div class="codeGrid"><div><label>בסיס - 8 ספרות</label><input id="codeBase" inputmode="numeric" autocomplete="off" maxlength="15" placeholder="60026342" oninput="cleanCodeFields('base')"><div id="baseCounter" class="fieldCounter">נותרו 8 ספרות</div></div><div><label>סיומת</label><input id="codeSuffix" inputmode="numeric" autocomplete="off" maxlength="3" placeholder="004" oninput="cleanCodeFields('suffix')"></div></div>
  <label>הערות</label><textarea id="notes" maxlength="250" placeholder="לא חובה"></textarea>
  <button class="save" onclick="saveItem()">שמור</button>
  <div class="smallHelp">הברקוד נשמר כ־8 ספרות + 0000 + סיומת בת 3 ספרות.</div>
</section>

<section id="barcodePage" class="whitePage">
  <div class="barcodeWrap">
    <div class="barcodeName" id="barcodeName"></div>
    <div class="barcodeNumber" id="barcodeNumber"></div>
    <div id="barcodeSvg"></div>
    <div class="barcodeActions">
      <button class="barcodeBackBtn" onclick="showPage('home')">חזרה</button>
      <button class="barcodeScannedBtn" onclick="handleBarcodeScanned()">נסרק</button>
    </div>
  </div>
</section>

<script src="js/config.js?v=1.30"></script>
<script src="js/utils.js?v=1.30"></script>
<script src="js/storage.js?v=1.30"></script>
<script src="js/barcode.js?v=1.30"></script>
<script src="js/shared.js?v=1.30"></script>
<script src="js/stats.js?v=1.30"></script>
<script src="js/app.js?v=1.30"></script>
<script src="js/pwa-enhance.js?v=1.30"></script>
<script>
function formatLastScannedDate(value) {
  const timestamp = Number(value || 0);
  if (!timestamp) return '';
  const d = new Date(timestamp);
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const hours = String(d.getHours()).padStart(2, '0');
  const minutes = String(d.getMinutes()).padStart(2, '0');
  return `${month}/${day} ${hours}:${minutes}`;
}

function isToday(value) {
  const timestamp = Number(value || 0);
  if (!timestamp) return false;
  const d = new Date(timestamp);
  const now = new Date();
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate();
}

const originalRenderItem = renderItem;
renderItem = function(x) {
  let html = originalRenderItem(x).replace('נפתחה ', 'נסרק ');
  if (activeTab !== 'local' || !Number(x.lastScannedAt || 0)) return html;
  const todayClass = isToday(x.lastScannedAt) ? ' today' : '';
  const scanText = `<span class="lastScannedText${todayClass}">נסרק לאחרונה: ${formatLastScannedDate(x.lastScannedAt)}</span>`;
  return html.replace(`<div class="itemName">${escapeHtml(x.name)}</div>`, `<div class="itemName">${escapeHtml(x.name)}${scanText}</div>`);
};

async function shareApp() {
  const url = window.location.href.split('#')[0];
  const instructions = 'פתח את הקישור בספארי. לאחר מכן לחץ על כפתור השיתוף ובחר „הוסף למסך הבית”.';
  const shareData = {
    title: 'פקע פקע',
    text: `אפליקציית פקע פקע\n\n${instructions}`,
    url
  };
  try {
    if (navigator.share) {
      await navigator.share(shareData);
      return;
    }
    await navigator.clipboard.writeText(`${shareData.text}\n\n${url}`);
    showAppDialog({ title: 'ההודעה הועתקה', text: 'הקישור והוראות ההתקנה הועתקו ללוח.', actions: [{ label: 'סגור' }] });
  } catch (error) {
    if (error && error.name === 'AbortError') return;
    showAppDialog({ title: 'השיתוף לא זמין', text: 'לא ניתן לפתוח את חלון השיתוף במכשיר הזה.', actions: [{ label: 'סגור' }] });
  }
}

function handleBarcodeScanned() {
  const el = document.getElementById('barcodeNumber');
  const nameEl = document.getElementById('barcodeName');
  const barcode = el ? el.textContent : '';
  const name = nameEl ? nameEl.textContent : '';
  if (el) incrementLocalScanCountByCode(barcode);
  if (typeof recordPakapakaScan === 'function') recordPakapakaScan({ barcode, name });
  showPage('home');
}

showDepartmentRequired = function() {
  const list = document.getElementById('list');
  if (!list) return;
  list.innerHTML = '<div class="empty departmentRequiredBox" onclick="changeDepartment()">לא נבחרה מחלקה לרשימה המשותפת.<br>לחץ כאן כדי להכניס מספר מחלקה.</div>';
};

renderList();
if (typeof activeTab !== 'undefined' && activeTab === 'shared' && !getDepartment()) showDepartmentRequired();
</script>
</body>
</html>
